<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1100">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#333333" />
    </marker>
    
    <g id="db-icon">
      <path d="M 0,10 C 0,0 70,0 70,10 L 70,55 C 70,65 0,65 0,55 Z" fill="#ffffff" stroke="#333333" stroke-width="2" />
      <path d="M 0,10 C 0,20 70,20 70,10" fill="none" stroke="#333333" stroke-width="2" />
      <path d="M 0,22 C 0,32 70,32 70,22" fill="none" stroke="#333333" stroke-width="1.5" />
      <path d="M 0,34 C 0,44 70,44 70,34" fill="none" stroke="#333333" stroke-width="1.5" />
      <path d="M 0,46 C 0,56 70,56 70,46" fill="none" stroke="#333333" stroke-width="1.5" />
      <text x="35" y="78" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333333">local database</text>
      <text x="35" y="90" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333333">storage</text>
    </g>

    <g id="gear-icon">
      <circle cx="0" cy="0" r="8" fill="none" stroke="#333333" stroke-width="2" />
      <path d="M -2,-8 L -2,-12 L 2,-12 L 2,-8 M 6,-5 L 9,-8 L 12,-5 L 9,-2 M 8,2 L 12,2 L 12,6 L 8,6 M 5,6 L 8,9 L 5,12 L 2,9 M -2,8 L -2,12 L 2,12 L 2,8 M -6,5 L -9,8 L -12,5 L -9,2 M -8,-2 L -12,-2 L -12,-6 L -8,-6 M -5,-6 L -8,-9 L -5,-12 L -2,-9" fill="none" stroke="#333333" stroke-width="2" stroke-linejoin="round" />
    </g>
  </defs>

  <style>
    .text-main { font-family: Arial, sans-serif; font-size: 18px; fill: #333333; }
    .text-title { font-family: Arial, sans-serif; font-size: 22px; fill: #333333; font-weight: normal; }
    .text-sub { font-family: Arial, sans-serif; font-size: 18px; fill: #333333; }
    .text-event { font-family: Arial, sans-serif; font-size: 18px; fill: #333333; }
    .text-bold { font-weight: bold; }
    .rect-box { fill: #ffffff; stroke: #333333; stroke-width: 1.5; rx: 8px; }
    .rect-large { fill: #ffffff; stroke: #333333; stroke-width: 1.5; rx: 12px; }
    .line-flow { fill: none; stroke: #333333; stroke-width: 1.5; }
    .line-container { fill: none; stroke: #333333; stroke-width: 1.5; stroke-dasharray: 2, 2; }
  </style>

  <rect x="15" y="145" width="970" height="910" class="line-container" />

  <g transform="translate(95, 10)">
    <circle cx="0" cy="20" r="12" fill="none" stroke="#333333" stroke-width="2" />
    <line x1="0" y1="32" x2="0" y2="65" stroke="#333333" stroke-width="2" />
    <line x1="-25" y1="45" x2="25" y2="45" stroke="#333333" stroke-width="2" />
    <line x1="0" y1="65" x2="-15" y2="90" stroke="#333333" stroke-width="2" />
    <line x1="0" y1="65" x2="15" y2="90" stroke="#333333" stroke-width="2" />
    <text x="0" y="105" class="text-main" text-anchor="middle">Translator</text>
    <line x1="28" y1="45" x2="75" y2="45" class="line-flow" marker-end="url(#arrow)" />
  </g>

  <rect x="170" y="10" width="175" height="85" class="rect-box" />
  <text x="257" y="43" class="text-sub" text-anchor="middle">Key &amp; Translation</text>
  <text x="257" y="65" class="text-sub" text-anchor="middle">management</text>
  <line x1="257" y1="95" x2="257" y2="178" class="line-flow" marker-end="url(#arrow)" />

  <rect x="474" y="10" width="175" height="85" class="rect-box" />
  <use href="#gear-icon" x="628" y="22" />
  <text x="555" y="55" class="text-sub" text-anchor="middle">Target application</text>
  <line x1="561" y1="95" x2="561" y2="178" class="line-flow" marker-end="url(#arrow)" />

  <g transform="translate(725, 10)">
    <circle cx="0" cy="20" r="12" fill="none" stroke="#333333" stroke-width="2" />
    <line x1="0" y1="32" x2="0" y2="65" stroke="#333333" stroke-width="2" />
    <line x1="-25" y1="45" x2="25" y2="45" stroke="#333333" stroke-width="2" />
    <line x1="0" y1="65" x2="-15" y2="90" stroke="#333333" stroke-width="2" />
    <line x1="0" y1="65" x2="15" y2="90" stroke="#333333" stroke-width="2" />
    <text x="0" y="105" class="text-main" text-anchor="middle">Translator</text>
    <line x1="28" y1="45" x2="44" y2="45" class="line-flow" marker-end="url(#arrow)" />
  </g>

  <rect x="769" y="10" width="175" height="85" class="rect-box" />
  <text x="856" y="55" class="text-sub" text-anchor="middle">UI: Global Search</text>
  <line x1="856" y1="95" x2="856" y2="178" class="line-flow" marker-end="url(#arrow)" />


  <g transform="translate(150, 180)">
    <rect x="0" y="0" width="210" height="500" class="rect-large" />
    <text x="105" y="230" class="text-title" text-anchor="middle">Translation</text>
    <text x="105" y="260" class="text-title" text-anchor="middle">Managment Table</text>
    <use href="#db-icon" x="112" y="405" />
  </g>

  <g transform="translate(455, 180)">
    <rect x="0" y="0" width="212" height="500" class="rect-large" />
    <text x="106" y="248" class="text-title" text-anchor="middle">Server API</text>
    <use href="#db-icon" x="114" y="405" />
  </g>

  <g transform="translate(750, 180)">
    <rect x="0" y="0" width="212" height="500" class="rect-large" />
    <text x="106" y="248" class="text-title" text-anchor="middle">Global Search</text>
    <use href="#db-icon" x="112" y="405" />
  </g>


  <rect x="42" y="770" width="760" height="210" class="line-container" />                                                                                                                                                                                                                                                    
  <text x="325" y="963" class="text-main text-bold">Database = Event Stream (append only)</text>   

  <g transform="translate(55, 795)">
    <rect x="0" y="0" width="165" height="135" class="rect-box" />
    <text x="82" y="60" class="text-event" text-anchor="middle">&lt;&lt;Event&gt;&gt;</text>
    <text x="82" y="84" class="text-event" text-anchor="middle">Tenant added</text>
  </g>

  <g transform="translate(270, 795)">
    <rect x="0" y="0" width="165" height="135" class="rect-box" />
    <text x="82" y="60" class="text-event" text-anchor="middle">&lt;&lt;Event&gt;&gt;</text>
    <text x="82" y="84" class="text-event" text-anchor="middle">Key added</text> <line x1="165" y1="67" x2="185" y2="67" class="line-flow" marker-end="url(#arrow)" />
  </g>

  <g transform="translate(485, 795)">
    <rect x="0" y="0" width="165" height="135" class="rect-box" />
    <text x="82" y="60" class="text-event" text-anchor="middle">&lt;&lt;Event&gt;&gt;</text>
    <text x="82" y="84" class="text-event" text-anchor="middle">Translation added</text>
  </g>


  <path d="M 255,680 L 255,692 L 402,692 L 402,792" class="line-flow" marker-end="url(#arrow)" />
  <text x="386" y="683" class="text-sub">Write</text>

  <path d="M 437,795 L 437,710 L 562,710 L 562,683" class="line-flow" marker-end="url(#arrow)" />
  <text x="434" y="702" class="text-sub">Read latest relevant events</text>

  <path d="M 437,795 L 437,735 L 856,735 L 856,683" class="line-flow" marker-end="url(#arrow)" />
  <text x="616" y="728" class="text-sub">Read latest relevant events</text>

</svg>
